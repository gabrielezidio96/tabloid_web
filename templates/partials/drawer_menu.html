{# Drawer menu — toggled by #drawer-toggle (CSS-only) #}
<input type="checkbox" id="drawer-toggle" class="hidden peer">

<label for="drawer-toggle" class="hidden peer-checked:block fixed inset-0 z-40 bg-black/45 cursor-pointer" aria-label="Fechar menu"></label>

<aside class="fixed top-0 left-0 z-50 h-full w-72 bg-white shadow-2xl transform -translate-x-full peer-checked:translate-x-0 transition-transform duration-200">
  <div class="flex items-center px-5 py-4 border-b border-gray-100 gap-3">
    <div class="w-8 h-8 rounded-lg bg-red-500 flex items-center justify-center">
      <span class="text-white font-extrabold text-base">T</span>
    </div>
    <span class="flex-1 text-lg font-bold text-gray-900">Tabloid</span>
    <label for="drawer-toggle" class="w-8 h-8 flex items-center justify-center cursor-pointer">
      <i class="fa-solid fa-xmark text-gray-700 text-sm" aria-hidden="true"></i>
    </label>
  </div>

  <div class="px-5 pt-5 pb-2 flex flex-col gap-2">
    <span class="text-xs font-bold text-gray-400 tracking-widest mb-1">LOCALIZAÇÃO</span>
    {% if selected_state or selected_city %}
    <div class="flex items-center bg-red-50 rounded-xl p-3 gap-2.5">
      <i class="fa-solid fa-location-dot text-red-500 text-sm" aria-hidden="true"></i>
      <div class="flex-1">
        <span class="block text-sm font-semibold text-gray-900">{{ selected_city|default:"Selecionar cidade" }}</span>
        {% if selected_state %}<span class="block text-xs text-gray-500 mt-px">{{ selected_state }}</span>{% endif %}
      </div>
    </div>
    {% endif %}
    <button type="button" id="drawer-use-location" data-geolocate-url="{% url 'geolocate' %}"
      class="flex items-center bg-red-50 rounded-xl p-3.5 gap-2.5 border border-red-200 cursor-pointer">
      <i class="fa-solid fa-crosshairs text-red-500 text-sm" aria-hidden="true"></i>
      <span class="flex-1 text-sm font-semibold text-red-500 text-left">Usar minha localização</span>
    </button>
  </div>

  <div class="h-px bg-gray-100 mx-5 mt-2"></div>

  <div class="px-5 pt-5 pb-2 flex flex-col gap-2">
    <span class="text-xs font-bold text-gray-400 tracking-widest mb-1">MENU</span>
    <a href="{% url 'deals:home' %}" class="flex items-center py-3 gap-3.5 no-underline">
      <i class="fa-solid fa-house text-gray-500 text-sm w-4 text-center" aria-hidden="true"></i>
      <span class="text-sm text-gray-700 font-medium">Início</span>
    </a>
    <a href="{% url 'deals:store-list' %}" class="flex items-center py-3 gap-3.5 no-underline">
      <i class="fa-solid fa-filter text-gray-500 text-sm w-4 text-center" aria-hidden="true"></i>
      <span class="text-sm text-gray-700 font-medium">Lojas</span>
    </a>
    <a href="{% url 'deals:saved-list-list' %}" class="flex items-center py-3 gap-3.5 no-underline">
      <i class="fa-regular fa-rectangle-list text-gray-500 text-sm w-4 text-center" aria-hidden="true"></i>
      <span class="text-sm text-gray-700 font-medium">Minhas listas</span>
    </a>
    <a href="{% url 'deals:notification-list' %}" class="flex items-center py-3 gap-3.5 no-underline">
      <i class="fa-solid fa-bell text-gray-500 text-sm w-4 text-center" aria-hidden="true"></i>
      <span class="text-sm text-gray-700 font-medium">Notificações</span>
    </a>
  </div>
</aside>
