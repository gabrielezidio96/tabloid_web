{# Args: store, selected (bool), href — small chip used in horizontal scroll #}
<a href="{{ href|default:'#' }}" class="shrink-0 mx-2.5 flex flex-col items-center w-16 no-underline">
  <div class="w-16 h-16 rounded-2xl overflow-hidden border border-gray-200 bg-white {% if selected %}ring-2 ring-red-500{% endif %}">
    {% if store.logo %}
    <img src="{{ store.logo.url }}" alt="{{ store.name }}" class="w-full h-full object-cover">
    {% else %}
    <span class="flex h-full w-full items-center justify-center text-sm font-bold text-gray-500">{{ store.name|slice:":2"|upper }}</span>
    {% endif %}
  </div>
  <span class="mt-1.5 text-xs font-semibold text-gray-700 text-center truncate max-w-[68px]">{{ store.name }}</span>
</a>
