{# Args: store, selected (bool), href — card used in horizontal scroll #}
<a href="{{ href|default:'#' }}" class="shrink-0 mx-1.5 first:ml-0 last:mr-0 flex flex-col w-32 lg:w-36 bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden no-underline {% if selected %}ring-2 ring-red-500{% endif %}">
  <div class="w-full aspect-square bg-gray-100">
    {% if store.logo %}
    <img src="{{ store.logo.url }}" alt="{{ store.name }}" class="w-full h-full object-cover">
    {% else %}
    <span class="flex h-full w-full items-center justify-center text-2xl font-bold text-gray-400">{{ store.name|slice:":2"|upper }}</span>
    {% endif %}
  </div>
  <div class="px-3 pt-2 pb-3 flex flex-col items-center text-center">
    <span class="text-sm font-bold text-gray-900 truncate max-w-full">{{ store.name }}</span>
    <div class="flex items-center gap-1 mt-1">
      <i class="fa-solid fa-circle-check text-blue-500 text-[10px]" aria-hidden="true"></i>
      <span class="text-[11px] text-gray-400 truncate">Loja verificada</span>
    </div>
  </div>
</a>
