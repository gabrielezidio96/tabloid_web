{# Args: category, ring_color (hex string), href #}
<a href="{{ href|default:'#' }}" class="shrink-0 mx-2.5 flex flex-col items-center no-underline">
  <div class="rounded-full" style="background-color: {{ ring_color|default:'#f97316' }}; padding: 2.5px;">
    <div class="rounded-full" style="background-color: #faf8f5; padding: 2px;">
      {% if category.image_url %}
      <img src="{{ category.image_url }}" alt="{{ category.name }}" class="w-16 h-16 rounded-full object-cover">
      {% else %}
      <div class="w-16 h-16 rounded-full bg-gray-100 flex items-center justify-center text-gray-400 text-lg">{{ category.name|slice:":1"|upper }}</div>
      {% endif %}
    </div>
  </div>
  <span class="mt-1.5 text-xs font-semibold text-gray-700 text-center truncate max-w-16">{{ category.name }}</span>
</a>
