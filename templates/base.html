{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Tabloid — Melhores Ofertas{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/swiper.min.css' %}">
  <link rel="stylesheet" href="{% static 'css/output.css' %}">
  <script src="https://unpkg.com/htmx.org@2.0.4"
    integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+"
    crossorigin="anonymous"></script>
  {% block extra_head %}{% endblock %}
</head>

<body class="bg-neutral-100 text-neutral-900 min-h-screen">
  <header class="bg-white border-b border-neutral-200 px-6 py-4 flex items-center gap-4">
    <h1 class="text-[1.4rem] font-bold text-brand tracking-tight">
      <a href="/" class="no-underline text-inherit">Tabloid</a>
    </h1>
    <span class="text-neutral-500 text-sm">Melhores ofertas do dia</span>
    <div class="ml-auto">
      {% block header_controls %}{% endblock %}
    </div>
  </header>
  <main class="max-w-7xl mx-auto px-6 py-6">
    {% block content %}{% endblock %}
  </main>
  <script src="{% static 'js/swiper.min.js' %}"></script>
  {% block extra_scripts %}{% endblock %}
</body>

</html>
